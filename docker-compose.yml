name: sekant

networks:
  sekant-net:
    name: sekant-net

volumes:
  caddy_data:
  clickhouse_data:
  postgres_data:
    name: sekant_postgres_data
  sekant_secrets:

services:
  init-secrets:
    image: ${SEKANT_INIT_SECRETS_IMAGE:-${SEKANT_INIT_SECRETS_IMAGE_REPO:-${SEKANT_IMAGE_REPO:-sekantsec/management-console}}:init-secrets-${SEKANT_INIT_SECRETS_IMAGE_TAG:-${SEKANT_IMAGE_TAG:-latest}}}
    container_name: sekant-init-secrets
    restart: unless-stopped
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      PUBLIC_URL: ${PUBLIC_URL:-https://localhost}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_EMAIL: ${KEYCLOAK_ADMIN_EMAIL:-}
      RESET_SEEDED_ADMIN_PASSWORD: ${RESET_SEEDED_ADMIN_PASSWORD:-0}
      CH_INGEST_USER: ${CH_INGEST_USER:-ch_ingest}
      FLUENT_BIT_INPUT_PORT: ${FLUENT_BIT_INPUT_PORT:-31415}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_TENANT_ID: ${MICROSOFT_OAUTH_TENANT_ID:-common}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      OKTA_OIDC_ISSUER: ${OKTA_OIDC_ISSUER:-}
      OKTA_OAUTH_CLIENT_ID: ${OKTA_OAUTH_CLIENT_ID:-}
      OKTA_OAUTH_CLIENT_SECRET: ${OKTA_OAUTH_CLIENT_SECRET:-}
    volumes:
      - sekant_secrets:/run/secrets
      - ./certs:/certs:ro
    entrypoint: ["/bin/sh", "-c", "sh /usr/local/bin/init-secrets.sh && tail -f /dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "ls /run/secrets/keycloak_admin_password && ls /run/secrets/seed_admin_temporary_password && ls /run/secrets/realm-export.json && ls /run/secrets/users.xml && ls /run/secrets/fluent-bit.conf && ls /run/secrets/security_events.lua && ls /run/secrets/Caddyfile"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - sekant-net

  caddy:
    image: caddy:2.11.4-alpine
    container_name: sekant-caddy
    restart: unless-stopped
    dns_opt:
      - ndots:0
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      FLUENT_BIT_INPUT_PORT: ${FLUENT_BIT_INPUT_PORT:-31415}
    ports:
      - "${DASHBOARD_HTTP_PORT:-80}:80"
      - "${DASHBOARD_HTTPS_PORT:-443}:443"
    volumes:
      - sekant_secrets:/run/secrets:ro
      - caddy_data:/data
      - ./certs:/certs:ro
    command: ["caddy", "run", "--config", "/run/secrets/Caddyfile", "--adapter", "caddyfile"]
    depends_on:
      init-secrets:
        condition: service_healthy
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider --no-check-certificate https://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - sekant-net

  nginx:
    image: ${SEKANT_IMAGE_REPO:-sekantsec/management-console}:nginx-${SEKANT_IMAGE_TAG:-latest}
    container_name: sekant-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - sekant-net

  frontend:
    image: ${SEKANT_IMAGE_REPO:-sekantsec/management-console}:frontend-${SEKANT_IMAGE_TAG:-latest}
    container_name: sekant-frontend
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sekant-net

  backend:
    image: ${SEKANT_IMAGE_REPO:-sekantsec/management-console}:backend-${SEKANT_IMAGE_TAG:-latest}
    container_name: sekant-backend
    restart: unless-stopped
    environment:
      PUBLIC_URL: ${PUBLIC_URL:-https://localhost}
      DASHBOARD_HTTP_PORT: ${DASHBOARD_HTTP_PORT:-80}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-sekant}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_EMAIL: ${KEYCLOAK_ADMIN_EMAIL:-}
      RESET_SEEDED_ADMIN_PASSWORD: ${RESET_SEEDED_ADMIN_PASSWORD:-0}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-backend}
      KEYCLOAK_CLIENT_SECRET_FILE: /run/secrets/keycloak_client_secret
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID:-frontend}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-sekant}
      POSTGRES_USER: ${POSTGRES_USER:-sekant}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_STORAGE_POLICY: ${CLICKHOUSE_STORAGE_POLICY:-}
      CLICKHOUSE_RETENTION_DAYS: ${CLICKHOUSE_RETENTION_DAYS:-700}
      CH_APP_ADMIN_USER: ${CH_APP_ADMIN_USER:-ch_app_admin}
      CH_APP_ADMIN_PASSWORD_FILE: /run/secrets/ch_app_admin_password
      CH_USER_ENCRYPTION_KEY_FILE: /run/secrets/ch_user_encryption_key
      SQLVALIDATOR_URL: ${SQLVALIDATOR_URL:-http://sql-validator:8001}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      MICROSOFT_OAUTH_TENANT_ID: ${MICROSOFT_OAUTH_TENANT_ID:-common}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:-}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:-}
      OKTA_OIDC_ISSUER: ${OKTA_OIDC_ISSUER:-}
      OKTA_OAUTH_CLIENT_ID: ${OKTA_OAUTH_CLIENT_ID:-}
      OKTA_OAUTH_CLIENT_SECRET: ${OKTA_OAUTH_CLIENT_SECRET:-}
    expose:
      - "4000"
    depends_on:
      init-secrets:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sql-validator:
        condition: service_healthy
    volumes:
      - sekant_secrets:/run/secrets
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.request('http://127.0.0.1:4000/health', { timeout: 2000 }, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - sekant-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: sekant-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      PUBLIC_URL: ${PUBLIC_URL:-https://localhost}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-sekant}
      KC_HOSTNAME_STRICT: "true"
      KC_PROXY: edge
      QUARKUS_HTTP_PROXY_ALLOW_X_FORWARDED: "true"
      QUARKUS_HTTP_PROXY_ALLOW_FORWARDED: "false"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export KC_DB_PASSWORD="$$(cat /opt/keycloak/data/import/postgres_password)"
        export KEYCLOAK_ADMIN_PASSWORD="$$(cat /opt/keycloak/data/import/keycloak_admin_password)"
        recovery_suffix="$$(printf '%s' "$$KEYCLOAK_ADMIN_PASSWORD" | sha256sum | cut -c1-12)"
        export KEYCLOAK_RECOVERY_CLIENT_ID="$${KEYCLOAK_RECOVERY_CLIENT_ID:-sekant-recovery-admin-$$recovery_suffix}"
        export KEYCLOAK_RECOVERY_CLIENT_SECRET="$$KEYCLOAK_ADMIN_PASSWORD"
        export PUBLIC_URL="$${PUBLIC_URL:-https://localhost}"
        export PUBLIC_URL="$$(printf '%s' "$$PUBLIC_URL" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$$//' | sed -E 's/^`//; s/`$$//; s/^"//; s/"$$//; s/^'"'"'//; s/'"'"'$$//' | sed -E 's/,+$$//')"
        if printf '%s' "$$PUBLIC_URL" | grep -Eiq '^[Hh][Tt][Tt][Pp][Ss]:?/*'; then
          export PUBLIC_URL="$$(printf '%s' "$$PUBLIC_URL" | sed -E 's#^[Hh][Tt][Tt][Pp][Ss]:?/*#https://#')"
        elif printf '%s' "$$PUBLIC_URL" | grep -Eiq '^[Hh][Tt][Tt][Pp]:?/*'; then
          export PUBLIC_URL="$$(printf '%s' "$$PUBLIC_URL" | sed -E 's#^[Hh][Tt][Tt][Pp]:?/*#http://#')"
        fi
        export PUBLIC_URL="$${PUBLIC_URL%/}"
        keycloak_hostname_raw="${KEYCLOAK_HOSTNAME:-}"
        keycloak_hostname="$$(printf '%s' "$$keycloak_hostname_raw" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$$//' | sed -E 's/^`//; s/`$$//; s/^"//; s/"$$//; s/^'"'"'//; s/'"'"'$$//' | sed -E 's/,+$$//')"
        if printf '%s' "$$keycloak_hostname" | grep -Eiq '^[Hh][Tt][Tt][Pp][Ss]:?/*'; then
          keycloak_hostname="$$(printf '%s' "$$keycloak_hostname" | sed -E 's#^[Hh][Tt][Tt][Pp][Ss]:?/*#https://#')"
        elif printf '%s' "$$keycloak_hostname" | grep -Eiq '^[Hh][Tt][Tt][Pp]:?/*'; then
          keycloak_hostname="$$(printf '%s' "$$keycloak_hostname" | sed -E 's#^[Hh][Tt][Tt][Pp]:?/*#http://#')"
        fi
        if [ -z "$$keycloak_hostname" ]; then
          keycloak_hostname="$$PUBLIC_URL"
        elif ! printf '%s' "$$keycloak_hostname" | grep -Eiq '^https?://'; then
          public_scheme="$$(printf '%s' "$$PUBLIC_URL" | sed -E 's#^(https?)://.*#\1#I')"
          if [ -z "$$public_scheme" ] || [ "$$public_scheme" = "$$PUBLIC_URL" ]; then
            public_scheme="https"
          fi
          keycloak_hostname="$$public_scheme://$$keycloak_hostname"
        fi
        keycloak_hostname="$${keycloak_hostname%/}"
        bootstrap_output="$$(/opt/keycloak/bin/kc.sh bootstrap-admin service --client-id "$$KEYCLOAK_RECOVERY_CLIENT_ID" --client-secret:env KEYCLOAK_RECOVERY_CLIENT_SECRET --no-prompt 2>&1)" || bootstrap_status="$$?"
        if [ -n "$${bootstrap_output:-}" ]; then
          printf '%s\n' "$$bootstrap_output"
        fi
        if [ -n "$${bootstrap_status:-}" ]; then
          if printf '%s' "$$bootstrap_output" | grep -Eiq 'duplicate key value|already exists'; then
            echo "Recovery admin service $$KEYCLOAK_RECOVERY_CLIENT_ID already exists; continuing startup."
          else
            exit "$$bootstrap_status"
          fi
        fi
        exec /opt/keycloak/bin/kc.sh start --http-enabled=true --import-realm --proxy-headers=xforwarded --hostname="$$keycloak_hostname" --hostname-strict=true
    expose:
      - "8080"
    volumes:
      - sekant_secrets:/opt/keycloak/data/import:ro
    depends_on:
      init-secrets:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s
    networks:
      - sekant-net

  clickhouse:
    image: clickhouse/clickhouse-server:26.5.1.882
    container_name: sekant-clickhouse
    restart: unless-stopped
    expose:
      - "8123"
      - "9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml:ro
      - ./clickhouse/config.d/disable-system-logs.xml:/etc/clickhouse-server/config.d/disable-system-logs.xml:ro
      - ./clickhouse/config.d/storage.xml:/etc/clickhouse-server/config.d/storage.xml:ro
      - ${CLICKHOUSE_INIT_SQL:-./clickhouse/init.sql}:/tmp/init.sql.src:ro
      - sekant_secrets:/run/secrets:ro
    environment:
      CLICKHOUSE_S3_ENDPOINT: ${CLICKHOUSE_S3_ENDPOINT:-}
      CLICKHOUSE_S3_ACCESS_KEY_ID: ${CLICKHOUSE_S3_ACCESS_KEY_ID:-}
      CLICKHOUSE_S3_SECRET_ACCESS_KEY: ${CLICKHOUSE_S3_SECRET_ACCESS_KEY:-}
      CLICKHOUSE_S3_REGION: ${CLICKHOUSE_S3_REGION:-}
      CLICKHOUSE_STORAGE_POLICY: ${CLICKHOUSE_STORAGE_POLICY:-}
    entrypoint: 
      - "/bin/sh"
      - "-c"
      - |
        cp /run/secrets/users.xml /etc/clickhouse-server/users.d/users.xml
        chmod 444 /etc/clickhouse-server/users.d/users.xml
        # Prepare init.sql in the standard init directory
        mkdir -p /docker-entrypoint-initdb.d
        cp /tmp/init.sql.src /docker-entrypoint-initdb.d/init.sql
        if [ -n "$$CLICKHOUSE_STORAGE_POLICY" ]; then
          sed -i "s/SETTINGS /SETTINGS storage_policy = '$$CLICKHOUSE_STORAGE_POLICY', /g" /docker-entrypoint-initdb.d/init.sql
        fi
        # On upgrades, remove persisted data/metadata for disabled internal log tables
        # so they do not consume disk after the new config disables them.
        for log_table in metric_log asynchronous_metric_log trace_log part_log; do
          uuid=""
          for metadata_file in "/var/lib/clickhouse/metadata/system/$$log_table.sql" "/var/lib/clickhouse/metadata_dropped/system/$$log_table.sql"; do
            if [ -f "$$metadata_file" ]; then
              current_uuid="$$(sed -n "s/.*UUID '\([^']*\)'.*/\1/p" "$$metadata_file" | head -n 1)"
              if [ -n "$$current_uuid" ]; then
                uuid="$$current_uuid"
              fi
              rm -f "$$metadata_file"
            fi
          done
          rm -rf "/var/lib/clickhouse/data/system/$$log_table"
          if [ -n "$$uuid" ]; then
            rm -rf "/var/lib/clickhouse/store/$${uuid%%-*}/$$uuid"
          fi
        done
        exec /entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client -q 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - sekant-net
    depends_on:
      init-secrets:
        condition: service_healthy

  postgres:
    image: postgres:18.4-alpine
    container_name: sekant-postgres
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /usr/local/bin/sekant-postgres-entrypoint.sh
    environment:
      POSTGRES_DB: sekant
      POSTGRES_USER: ${POSTGRES_USER:-sekant}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      # Mount only the actual init SQL so the custom entrypoint wrapper
      # is not auto-executed a second time by Postgres initdb.
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/reconcile-password-entrypoint.sh:/usr/local/bin/sekant-postgres-entrypoint.sh:ro
      - sekant_secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$$(cat /run/secrets/postgres_password 2>/dev/null)\" psql -h 127.0.0.1 -U ${POSTGRES_USER:-sekant} -d ${POSTGRES_DB:-sekant} -Atqc 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - sekant-net
    depends_on:
      init-secrets:
        condition: service_healthy

  redis:
    image: redis:8.8.0-alpine
    container_name: sekant-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - sekant-net

  sql-validator:
    image: ${SEKANT_IMAGE_REPO:-sekantsec/management-console}:sql-validator-${SEKANT_IMAGE_TAG:-latest}
    container_name: sekant-sql-validator
    restart: unless-stopped
    environment:
      ALLOWED_TABLES: ${SQLVALIDATOR_ALLOWED_TABLES:-security_events,sekant.security_events}
      MAX_LIMIT: ${SQLVALIDATOR_MAX_LIMIT:-10000}
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sekant-net

  fluent-bit:
    image: fluent/fluent-bit:5.0.7
    container_name: sekant-fluent-bit
    restart: unless-stopped
    entrypoint: ["/fluent-bit/bin/fluent-bit", "-c", "/run/secrets/fluent-bit.conf"]
    depends_on:
      init-secrets:
        condition: service_healthy
        restart: true
      clickhouse:
        condition: service_healthy
    volumes:
      - sekant_secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "/fluent-bit/bin/fluent-bit", "--dry-run", "-c", "/run/secrets/fluent-bit.conf"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sekant-net

  readiness:
    image: alpine:3.24.1
    container_name: sekant-readiness
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_healthy
      nginx:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sql-validator:
        condition: service_healthy
      fluent-bit:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        wget --quiet --spider http://frontend:3000/health
        wget --quiet --spider http://backend:4000/health
        wget --quiet --spider http://nginx/health
        wget --quiet --spider --no-check-certificate --header='Host: localhost' https://caddy/health
        echo ready >/tmp/status
        echo 'Sekant Platform is READY!'
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "grep -q '^ready$' /tmp/status"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - sekant-net
